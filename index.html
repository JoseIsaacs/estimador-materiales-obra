<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>App de Obra</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.menu{
display:flex;
justify-content:space-around;
background:#34495e;
padding:10px;
}

.menu button{
background:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

.contenido{
padding:20px;
display:none;
}

.activo{
display:block;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">App Profesional de Obra</div>

<div class="menu">
<button onclick="mostrar('concreto')">Concreto</button>
<button onclick="mostrar('bloques')">Muros</button>
<button onclick="mostrar('pisos')">Pisos</button>
<button onclick="mostrar('columnas')">Columnas</button>
</div>

<!-- CONCRETO -->
<div id="concreto" class="contenido activo">
<div class="card">

<h3>Concreto</h3>

<input id="area" placeholder="Área m²">
<input id="espesor" placeholder="Espesor cm">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

</div>
</div>

<!-- BLOQUES -->
<div id="bloques" class="contenido">
<div class="card">

<h3>Muros (Bloques)</h3>

<input id="pared" placeholder="Área m²">

<button onclick="bloques()">Calcular</button>

<div id="resultado_bloques"></div>

</div>
</div>

<!-- PISOS -->
<div id="pisos" class="contenido">
<div class="card">

<h3>Pisos (Baldosas)</h3>

<input id="area_piso" placeholder="Área m²">
<input id="lado_baldosa" placeholder="Tamaño cm">

<button onclick="baldosas()">Calcular</button>

<div id="resultado_baldosas"></div>

</div>
</div>

<!-- COLUMNAS -->
<div id="columnas" class="contenido">
<div class="card">

<h3>Columnas</h3>

<input id="num_col" placeholder="Cantidad">
<input id="altura_col" placeholder="Altura m">
<input id="seccion_col" placeholder="Sección cm">

<button onclick="columnas()">Calcular</button>

<div id="resultado_columnas"></div>

</div>
</div>

<!-- GUARDAR -->
<div class="contenido activo">
<div class="card">

<h3>Guardar Proyecto</h3>

<input id="nombre_proyecto" placeholder="Nombre del proyecto">

<button onclick="guardarProyecto()">Guardar</button>
<button onclick="exportarPDF()">Exportar PDF</button>

<ul id="lista_proyectos"></ul>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function mostrar(id){

let secciones = document.querySelectorAll(".contenido");

secciones.forEach(sec => sec.classList.remove("activo"));

document.getElementById(id).classList.add("activo");

}

function calcular(){

let area = document.getElementById("area").value;
let espesor = document.getElementById("espesor").value;

let volumen = area * (espesor/100);

document.getElementById("resultado").innerHTML =
"Volumen: " + volumen.toFixed(2) + " m³";

}

function bloques(){

let pared = document.getElementById("pared").value;

let bloques = pared * 12.5;
let mortero = pared * 0.02;

document.getElementById("resultado_bloques").innerHTML =
"Bloques: " + Math.ceil(bloques) +
"<br>Mortero: " + mortero.toFixed(2);

}

function baldosas(){

let area = document.getElementById("area_piso").value;
let lado = document.getElementById("lado_baldosa").value;

let area_baldosa = (lado/100)*(lado/100);
let cantidad = (area / area_baldosa)*1.1;

document.getElementById("resultado_baldosas").innerHTML =
"Baldosas: " + Math.ceil(cantidad);

}

function columnas(){

let n = document.getElementById("num_col").value;
let h = document.getElementById("altura_col").value;
let s = document.getElementById("seccion_col").value;

let area = (s/100)*(s/100);
let volumen = area*h*n;

document.getElementById("resultado_columnas").innerHTML =
"Concreto: " + volumen.toFixed(2) + " m³";

}

function guardarProyecto(){

let nombre = document.getElementById("nombre_proyecto").value;

let datos = {
nombre:nombre,
concreto:document.getElementById("resultado").innerText,
bloques:document.getElementById("resultado_bloques").innerText,
pisos:document.getElementById("resultado_baldosas").innerText,
columnas:document.getElementById("resultado_columnas").innerText
};

let proyectos = JSON.parse(localStorage.getItem("proyectos")) || [];

proyectos.push(datos);

localStorage.setItem("proyectos", JSON.stringify(proyectos));

mostrarProyectos();

}

function mostrarProyectos(){

let proyectos = JSON.parse(localStorage.getItem("proyectos")) || [];

let lista = document.getElementById("lista_proyectos");

lista.innerHTML = "";

proyectos.forEach(p => {

let li = document.createElement("li");

li.innerHTML = "<b>"+p.nombre+"</b><br>"+p.concreto+"<br>"+p.bloques+"<br>"+p.pisos+"<br>"+p.columnas;

lista.appendChild(li);

});

}

function exportarPDF(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF();

let nombre = document.getElementById("nombre_proyecto").value;

doc.text("Proyecto: "+nombre,20,20);

doc.save("obra.pdf");

}

window.onload = mostrarProyectos;

</script>

</body>
</html>
