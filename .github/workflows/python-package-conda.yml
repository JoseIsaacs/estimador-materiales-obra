name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Configuración oficial de Conda (reemplaza a setup-python y al path manual)
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.10"
        activate-environment: estimador-env # Nombre de tu entorno
        environment-file: environment.yml
        auto-activate-base: false

    # 2. Instalación de herramientas de calidad (usando shell de bash para Conda)
    - name: Install Lint/Test tools
      shell: bash -l {0}
      run: |
        conda install flake8 pytest

    # 3. Linting
    - name: Lint with flake8
      shell: bash -l {0}
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 4. Pruebas unitarias
    - name: Test with pytest
      shell: bash -l {0}
      run: |
       pytest 